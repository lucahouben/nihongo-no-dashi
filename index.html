<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nihongo no dashi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍲</text></svg>">
    <style>
        :root {
            --stage-prepping: #8c9e82; --stage-simmering: #e9b86d;
            --stage-boiling: #a66b3e; --stage-infusing: #844c2a; 
            --stage-perfect: #d32f2f; --dashi-gold: #ffcc66;
            --dark-kombu: #121412; --text: #f4f4f4; --card-bg: #222522;
            --toggle-bg: #333;
        }

        [data-theme="light"] {
            --dark-kombu: #f0f0f0; --text: #1a1a1a;
            --card-bg: #ffffff; --dashi-gold: #d4a017;
            --toggle-bg: #ddd;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--dark-kombu); color: var(--text);
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 40px 0; box-sizing: border-box; user-select: none;
            overflow: hidden; transition: background-color 0.3s;
        }

        #app { width: 90%; max-width: 400px; text-align: center; perspective: 1200px; position: relative; }

        /* EXIT BUTTON */
        #exit-btn {
            position: absolute; top: -45px; left: 0; display: none;
            background: rgba(128, 128, 128, 0.1); border: 1px solid rgba(128,128,128,0.4);
            color: #888; font-size: 0.65rem; font-weight: 800; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.2s; z-index: 10;
        }

        /* QUICK ADD DRAWER */
        #add-form-overlay {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%;
            background: var(--dark-kombu); z-index: 1000; transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 25px; box-sizing: border-box; display: flex; flex-direction: column;
        }
        #add-form-overlay.active { bottom: 0; }
        
        .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 18px; }
        .form-group label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: var(--dashi-gold); display: block; margin-bottom: 6px; letter-spacing: 1px; }
        .form-group input { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(128,128,128,0.2); 
            background: var(--card-bg); color: var(--text); font-family: inherit; font-size: 1rem; box-sizing: border-box; outline: none;
        }
        .form-group input:focus { border-color: var(--dashi-gold); }

        /* DASHBOARD */
        #dashboard { background: var(--card-bg); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .dash-title { font-size: 1rem; font-weight: 800; color: var(--dashi-gold); letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .btn-add-toggle { 
            background: var(--dashi-gold); border: none; width: 32px; height: 32px; 
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 800; color: #1a1a1a; transition: transform 0.2s;
        }
        .btn-add-toggle:hover { transform: scale(1.1); }

        .stats-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-radius: 15px; font-weight: 600; color: white; }

        .btn-main { background: var(--dashi-gold); color: #1a1a1a; padding: 18px; border-radius: 15px; border: none; font-weight: 800; font-size: 0.9rem; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .btn-secondary { background: transparent; color: #888; border: 1px solid rgba(128,128,128,0.4); padding: 12px; border-radius: 15px; width: 100%; margin-top: 10px; cursor: pointer; }

        /* CARD STYLES */
        #progress-container { width: 100%; height: 6px; background: rgba(128,128,128,0.2); border-radius: 10px; margin-bottom: 20px; overflow: hidden; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--dashi-gold); transition: width 0.5s ease; }

        .flashcard { width: 100%; height: 480px; max-height: 70vh; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; display: none; }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; display: flex; flex-direction: column; align-items: center; padding: 30px 25px; box-sizing: border-box; box-shadow: 0 15px 45px rgba(0,0,0,0.3); transition: background-color 0.3s; }
        .card-front { background: var(--dashi-gold); color: #1a1a1a; justify-content: center; font-size: 5rem; font-weight: 800; font-family: serif; word-break: keep-all; }
        .card-back { background: var(--card-bg); transform: rotateY(180deg); border-bottom: 10px solid var(--stage-prepping); overflow-y: auto; scrollbar-width: none; }
        
        .reading { font-size: 2.2rem; font-weight: 800; margin-bottom: 5px; word-break: keep-all; }
        .meaning { font-size: 1.5rem; color: var(--text); margin-bottom: 15px; }

        #info-tray { width: 100%; text-align: left; border-top: 1px solid rgba(128,128,128,0.2); padding-top: 15px; display: none; margin-bottom: 20px; }
        .tray-label { font-size: 0.55rem; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: 800; }
        .tray-content { font-size: 0.9rem; color: var(--text); margin-bottom: 12px; line-height: 1.5; word-break: keep-all; }

        .embedded-controls { width: 100%; margin-top: auto; padding-top: 10px; }
        .btn-correct { background: #28a745; color: white; margin-bottom: 8px; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-wrong { background: #dc3545; color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="app">
    <button id="exit-btn" onclick="location.reload()">Exit Session</button>

    <div id="add-form-overlay">
        <div class="form-header">
            <h2 class="dash-title">Add New Word</h2>
            <button class="btn-add-toggle" onclick="toggleAddForm()" style="background:#444; color:white;">×</button>
        </div>
        <div class="form-group"><label>Kanji / Word</label><input type="text" id="new-kanji" placeholder="e.g. 食べる"></div>
        <div class="form-group"><label>Reading</label><input type="text" id="new-reading" placeholder="e.g. たべる"></div>
        <div class="form-group"><label>Meaning</label><input type="text" id="new-meaning" placeholder="e.g. To eat"></div>
        <div class="form-group"><label>Word Type</label><input type="text" id="new-type" placeholder="e.g. Ichidan Verb"></div>
        <div class="form-group"><label>Example Sentence</label><input type="text" id="new-example" placeholder="Optional"></div>
        <button class="btn-main" onclick="submitNewWord()" id="add-submit-btn" style="margin-top:auto;">Add to Dashi Pot</button>
    </div>

    <div id="dashboard">
        <div class="dash-header">
            <h1 class="dash-title">Nihongo no Dashi</h1>
            <button class="btn-add-toggle" onclick="toggleAddForm()">+</button>
        </div>
        <div id="stats-display" class="stats-list"></div>
        <button class="btn-main" id="start-btn" onclick="startSession(false)">Start Session (0)</button>
        <button class="btn-secondary" onclick="startSession(true)">Practice All (No Sync)</button>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div class="flashcard" id="card" onclick="handleCardClick()">
        <div class="card-face card-front" id="display-front">...</div>
        <div class="card-face card-back" id="card-back-ui">
            <div id="type-text" style="font-size:0.6rem; color:var(--dashi-gold); border:1px solid var(--dashi-gold); padding:2px 10px; border-radius:100px; text-transform:uppercase; font-weight:800; margin-bottom:12px;"></div>
            <div id="reading-text" class="reading"></div>
            <div id="meaning-text" class="meaning"></div>
            <div id="info-tray">
                <div class="tray-label">Example</div><div id="sent-text" class="tray-content"></div>
            </div>
            <div class="embedded-controls">
                <button class="btn-correct" onclick="submitResult(true, event)">Correct (1)</button>
                <button class="btn-wrong" onclick="submitResult(false, event)">Wrong (2)</button>
                <button style="background:none; border:none; color:#888; font-size:0.55rem; width:100%; margin-top:5px; cursor:pointer; font-weight:800;" onclick="toggleDetails(event)">DETAILS (F)</button>
            </div>
        </div>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ7pDV2s1fCr9E_RI-47f8XTwMUWUQ9bvNiuPVv3D1uM690uoUWxXfMGbtRLbKNTeZVN8Xf-2jjrPb/pub?output=csv';
    const SAVE_URL = 'https://script.google.com/macros/s/AKfycbyjyKbLIkUqjZAFW0P3vKPg5Oo1amVGliLz28NKEbyjHqQY1Kz4PELMAB9Hu8gs7nZ2qg/exec';

    let masterList = [], reviewQueue = [], currentItem = null, isFlipped = false;
    let completedCount = 0, initialQueueLength = 0, isPracticeMode = false;

    const STAGES = [
        { name: "PREPPING", color: "#8c9e82" }, { name: "SIMMERING", color: "#e9b86d" },
        { name: "BOILING", color: "#a66b3e" }, { name: "INFUSING", color: "#844c2a" },
        { name: "PERFECT DASHI", color: "#d32f2f" }
    ];

    function getStage(level) {
        if (level <= 2) return STAGES[0]; if (level <= 4) return STAGES[1];
        if (level <= 6) return STAGES[2]; if (level <= 8) return STAGES[3];
        return STAGES[4];
    }

    const cardEl = document.getElementById('card');
    cardEl.addEventListener('transitionend', (e) => {
        if (e.propertyName === 'transform' && !isFlipped) updateBackUI();
    });

    async function init() {
        try {
            const res = await fetch(CSV_URL + '&cb=' + Date.now());
            const text = await res.text();
            const lines = text.split(/\r?\n/).slice(1);
            masterList = lines.filter(l => l.trim()).map(line => {
                const p = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    kanji: p[0]?.replace(/"/g, '').trim(), reading: p[1]?.replace(/"/g, '').trim(),
                    meaning: p[2]?.replace(/"/g, '').trim(), type: p[3]?.replace(/"/g, '').trim(),
                    sent: p[5]?.replace(/"/g, '').trim(), level: parseInt(p[6]) || 0, nextReview: parseInt(p[7]) || 0
                };
            });
            updateDashboard();
        } catch (e) { console.error("Error loading CSV:", e); }
    }

    function updateDashboard() {
        reviewQueue = masterList.filter(i => i.nextReview <= Date.now());
        const counts = [0,0,0,0,0];
        masterList.forEach(i => counts[STAGES.findIndex(s => s.name === getStage(i.level).name)]++);
        document.getElementById('stats-display').innerHTML = STAGES.map((s, i) => `
            <div class="stat-row" style="background:${s.color}">
                <div class="stat-name">${s.name}</div><div class="stat-count">${counts[i]}</div>
            </div>`).join('');
        document.getElementById('start-btn').innerText = `Start Session (${reviewQueue.length})`;
    }

    function toggleAddForm() {
        document.getElementById('add-form-overlay').classList.toggle('active');
    }

    async function submitNewWord() {
        const btn = document.getElementById('add-submit-btn');
        const data = {
            type: 'add',
            kanji: document.getElementById('new-kanji').value,
            reading: document.getElementById('new-reading').value,
            meaning: document.getElementById('new-meaning').value,
            wordType: document.getElementById('new-type').value,
            example: document.getElementById('new-example').value,
            conj: ""
        };

        if(!data.kanji || !data.meaning) return alert("Please enter at least Kanji and Meaning.");

        btn.innerText = "Adding...";
        btn.disabled = true;

        try {
            await fetch(SAVE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Word added! Refresh the page to see it in your session.");
            location.reload();
        } catch(e) {
            alert("Error adding word.");
            btn.innerText = "Add to Dashi Pot";
            btn.disabled = false;
        }
    }

    function startSession(practice) {
        isPracticeMode = practice;
        reviewQueue = practice ? [...masterList].sort(() => 0.5 - Math.random()) : masterList.filter(i => i.nextReview <= Date.now());
        if (reviewQueue.length === 0) return alert("Nothing to review!");
        
        initialQueueLength = reviewQueue.length;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('progress-container').style.display = 'block';
        cardEl.style.display = 'block';
        document.getElementById('exit-btn').style.display = 'block';
        nextItem(true);
    }

    function nextItem(first = false) {
        if (reviewQueue.length === 0) return location.reload();
        currentItem = reviewQueue[Math.floor(Math.random() * reviewQueue.length)];
        document.getElementById('display-front').innerText = currentItem.kanji;
        if (first) updateBackUI();
    }

    function updateBackUI() {
        if (!currentItem) return;
        const s = getStage(currentItem.level);
        document.getElementById('card-back-ui').style.borderBottomColor = s.color;
        document.getElementById('reading-text').innerText = currentItem.reading;
        document.getElementById('reading-text').style.color = s.color;
        document.getElementById('meaning-text').innerText = currentItem.meaning;
        document.getElementById('type-text').innerText = currentItem.type;
        document.getElementById('sent-text').innerText = currentItem.sent || "No example provided.";
        document.getElementById('info-tray').style.display = "none";
    }

    function handleCardClick() { if(!isFlipped) { isFlipped = true; cardEl.classList.add('is-flipped'); } }

    async function submitResult(isCorrect, e) {
        if(e) e.stopPropagation();
        if (!isPracticeMode) {
            const nl = isCorrect ? currentItem.level + 1 : Math.max(0, currentItem.level - 1);
            const ivs = [0, 14400000, 28800000, 86400000, 172800000, 604800000, 1209600000, 2592000000, 10000000000];
            fetch(SAVE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ kanji: currentItem.kanji, level: nl, nextReview: (Date.now() + ivs[Math.min(nl, 8)]) }) });
        }
        completedCount++;
        document.getElementById('progress-bar').style.width = (completedCount / initialQueueLength * 100) + "%";
        reviewQueue = reviewQueue.filter(i => i !== currentItem);
        isFlipped = false;
        cardEl.classList.remove('is-flipped');
        setTimeout(() => nextItem(), 400);
    }

    function toggleDetails(e) { e.stopPropagation(); const t = document.getElementById('info-tray'); t.style.display = t.style.display === "block" ? "none" : "block"; }

    init();
</script>
</body>
</html>

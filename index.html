<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nihongo no dashi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍲</text></svg>">
    <style>
        :root {
            --stage-prepping: #8c9e82; --stage-simmering: #e9b86d;
            --stage-boiling: #a66b3e; --stage-infusing: #844c2a; 
            --stage-perfect: #d32f2f; --dashi-gold: #ffcc66;
            --dark-kombu: #121412; --text: #f4f4f4; --card-bg: #222522;
            --toggle-bg: #333;
        }
        .card-correct { border: 4px solid #28a745 !important; border-radius: 25px; }
        .card-wrong { border: 4px solid #dc3545 !important; border-radius: 25px; }
        [data-theme="light"] {
            --dark-kombu: #f0f0f0; --text: #1a1a1a;
            --card-bg: #ffffff; --dashi-gold: #d4a017;
            --toggle-bg: #ddd;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-kombu); color: var(--text);
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 40px 0; box-sizing: border-box; user-select: none;
            overflow: hidden; transition: background-color 0.3s;
        }
        #app { width: 90%; max-width: 400px; text-align: center; position: relative; }
        .theme-switch-wrapper { position: absolute; top: -45px; right: 0; display: flex; align-items: center; z-index: 100; }
        .theme-switch { display: inline-block; height: 18px; position: relative; width: 36px; }
        .theme-switch input { display:none; }
        .slider { background-color: var(--toggle-bg); bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: var(--dashi-gold); bottom: 3px; content: ""; height: 12px; left: 3px; position: absolute; transition: .4s; width: 12px; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(18px); }
        #exit-btn {
            position: absolute; top: -45px; left: 0; display: none;
            background: rgba(128, 128, 128, 0.1); border: 1px solid rgba(128,128,128,0.4);
            color: #888; font-size: 0.65rem; font-weight: 800; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; text-transform: uppercase; z-index: 100;
        }
        #dashboard { background: var(--card-bg); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: block; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .dash-title { font-size: 0.9rem; font-weight: 800; color: var(--dashi-gold); letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .btn-add-toggle { background: var(--dashi-gold); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 800; color: #1a1a1a; }
        .stats-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .stat-group { border-radius: 15px; overflow: hidden; background: rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; font-weight: 800; color: white; cursor: pointer; }
        .level-items { padding: 0 20px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s; font-size: 0.8rem; color: #bbb; text-align: left; line-height: 1.6; }
        .stat-group.active .level-items { max-height: 100px; padding: 10px 20px 20px; overflow-y: auto; }
        .btn-mini-play { background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 8px; border-radius: 6px; font-size: 0.6rem; cursor: pointer; margin-left: 10px; }
        .btn-main { background: var(--dashi-gold); color: #1a1a1a; padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .btn-secondary { background: transparent; color: #888; border: 1px solid rgba(128,128,128,0.4); padding: 12px; border-radius: 15px; width: 100%; margin-top: 10px; cursor: pointer; }
        #progress-container { width: 100%; height: 6px; background: rgba(128,128,128,0.2); border-radius: 10px; margin-bottom: 20px; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--dashi-gold); transition: width 0.5s; }
        .flashcard { width: 100%; height: 480px; max-height: 70vh; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; display: none; }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; display: flex; flex-direction: column; align-items: center; padding: 30px 25px; box-sizing: border-box; box-shadow: 0 15px 45px rgba(0,0,0,0.3); }
        .card-front { background: var(--dashi-gold); color: #1a1a1a; justify-content: center; font-size: 5rem; font-weight: 800; font-family: serif; word-break: break-word; overflow-wrap: break-word; line-height: 1.1; }
        .card-back { background: var(--card-bg); transform: rotateY(180deg); border-bottom: 10px solid var(--stage-prepping); overflow-y: auto; scrollbar-width: none; }
        #level-indicator { position: absolute; top: 15px; right: 20px; font-size: 0.7rem; font-weight: 800; }
        .reading { font-size: 2.2rem; font-weight: 800; margin-bottom: 5px; }
        .meaning { font-size: 1.5rem; color: var(--text); margin-bottom: 15px; }
        #info-tray { width: 100%; text-align: left; border-top: 1px solid rgba(128,128,128,0.2); padding-top: 15px; display: none; margin-bottom: 20px; }
        #keyboard-legend { margin-top: 25px; display: none; color: #888; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .key-hint { border: 1px solid rgba(128,128,128,0.5); padding: 1px 4px; border-radius: 3px; color: var(--dashi-gold); margin: 0 3px; }
        #add-form-overlay {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: var(--dark-kombu); z-index: 2000; transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 25px; box-sizing: border-box; display: flex; flex-direction: column;
        }
        #add-form-overlay.active { top: 0; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: var(--dashi-gold); display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(128,128,128,0.2); background: var(--card-bg); color: var(--text); font-family: inherit; font-size: 1rem; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

<div id="app">
    <button id="exit-btn" onclick="location.reload()">Exit Session</button>
    <div class="theme-switch-wrapper"><label class="theme-switch"><input type="checkbox" id="theme-toggle" /><div class="slider"></div></label></div>

    <div id="audio-mode-toggle" style="position: absolute; top: -45px; right: 50px; display: none; align-items: center; gap: 5px; font-size: 0.6rem; font-weight: 800; color: #888;">
        <span>AUDIO MODE</span>
        <label class="theme-switch"><input type="checkbox" id="audio-mode-checkbox" /><div class="slider"></div></label>
    </div>

    <div id="add-form-overlay">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 class="dash-title">Add to Pot</h2>
            <button class="btn-add-toggle" onclick="toggleAddForm()" style="background:#444; color:white;">×</button>
        </div>
        <div class="form-group"><label>Kanji</label><input type="text" id="new-kanji"></div>
        <div class="form-group"><label>Reading</label><input type="text" id="new-reading"></div>
        <div class="form-group"><label>Meaning</label><input type="text" id="new-meaning"></div>
        <div class="form-group"><label>Type</label><input type="text" id="new-type"></div>
        <div class="form-group"><label>Example</label><input type="text" id="new-example"></div>
        <button class="btn-main" onclick="submitNewWord()" id="add-submit-btn" style="margin-top:auto;">Add to Pot</button>
    </div>

    <div id="dashboard">
        <div class="dash-header"><h1 class="dash-title">Nihongo no Dashi</h1><button class="btn-add-toggle" onclick="toggleAddForm()">+</button></div>
        <div id="stats-display" class="stats-list"></div>
        <button class="btn-main" id="start-btn" onclick="startSession('due')">Start Cooking (0)</button>
        <button class="btn-secondary" onclick="startSession('all')">Cooking Practice (all)</button>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>
    <div class="flashcard" id="card" onclick="handleCardClick()">
        <div class="card-face card-front" id="display-front">...</div>
        <div id="session-summary" style="display:none; flex-direction:column; align-items:center; justify-content:center; height:100%; width:100%; background:var(--card-bg); border-radius:25px; color:var(--text); padding:20px; box-sizing:border-box;">
            <h2 style="color:var(--dashi-gold); margin-bottom:20px; font-size:1.2rem;">SESSION RECIPE</h2>
            <div style="width:100%; display:flex; flex-direction:column; gap:15px; font-weight:600;">
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:8px;"><span>Items Prepped</span><span id="summary-total">0</span></div>
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:8px; color:#28a745;"><span>Perfectly Seasoned</span><span id="summary-correct">0</span></div>
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:8px; color:#dc3545;"><span>Needs More Salt</span><span id="summary-wrong">0</span></div>
            </div>
            <button class="btn-secondary" onclick="location.reload()" style="margin-top:30px;">Back to Kitchen</button>
        </div>
        <div class="card-face card-back" id="card-back-ui">
            <div id="type-text" style="font-size:0.6rem; color:var(--dashi-gold); border:1px solid var(--dashi-gold); padding:2px 10px; border-radius:100px; text-transform:uppercase; font-weight:800; margin-bottom:12px;"></div>
            <div id="level-indicator"></div>
            <div id="reading-text" class="reading"></div>
            <div id="meaning-text" class="meaning"></div>
            <div id="info-tray">
                <div style="font-size: 0.55rem; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: 800;">Example</div>
                <div id="sent-text" style="font-size: 0.85rem; color: var(--text); line-height: 1.4;"></div>
            </div>
            <div style="width:100%; margin-top:auto;">
                <button class="btn-correct" onclick="submitResult(true, event)" style="background:#28a745; color:white; margin-bottom:8px; border:none; width:100%; padding:14px; border-radius:12px; font-weight:800; cursor:pointer;">Correct (1)</button>
                <button class="btn-wrong" onclick="submitResult(false, event)" style="background:#dc3545; color:white; border:none; width:100%; padding:14px; border-radius:12px; font-weight:800; cursor:pointer;">Wrong (2)</button>
                <button style="background:none; border:none; color:#888; font-size:0.55rem; width:100%; margin-top:10px; cursor:pointer; font-weight:800;" onclick="toggleDetails(event)">DETAILS (F)</button>
            </div>
        </div>
    </div>

    <div id="keyboard-legend">
        <span class="key-hint">V</span> Audio &nbsp; <span class="key-hint">Space</span> Flip &nbsp; <span class="key-hint">1/2</span> Result &nbsp; <span class="key-hint">F</span> Info &nbsp; <span class="key-hint">Esc</span> Exit
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ7pDV2s1fCr9E_RI-47f8XTwMUWUQ9bvNiuPVv3D1uM690uoUWxXfMGbtRLbKNTeZVN8Xf-2jjrPb/pub?output=csv';
    const SAVE_URL = 'https://script.google.com/macros/s/AKfycbyjyKbLIkUqjZAFW0P3vKPg5Oo1amVGliLz28NKEbyjHqQY1Kz4PELMAB9Hu8gs7nZ2qg/exec';

    let masterList = [], reviewQueue = [], currentItem = null, isFlipped = false, isPracticeMode = false;
    let completedCount = 0, initialQueueLength = 0, audioMode = false, sessionWrongCount = 0;

    const STAGES = [
        { name: "PREPPING", color: "#8c9e82", min: 0, max: 2 },
        { name: "SIMMERING", color: "#e9b86d", min: 3, max: 4 },
        { name: "BOILING", color: "#a66b3e", min: 5, max: 6 },
        { name: "INFUSING", color: "#844c2a", min: 7, max: 8 },
        { name: "PERFECT DASHI", color: "#d32f2f", min: 9, max: 99 }
    ];

    function getStageIdx(level) { return STAGES.findIndex(s => level >= s.min && level <= s.max); }

    const themeToggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'light') { document.documentElement.setAttribute('data-theme', 'light'); themeToggle.checked = true; }
    themeToggle.addEventListener('change', (e) => {
        const t = e.target.checked ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t);
    });

    document.getElementById('audio-mode-checkbox').addEventListener('change', (e) => {
        audioMode = e.target.checked;
        /* Update card face immediately if toggled during an active session */
        if (currentItem && !isFlipped && document.getElementById('card').style.display === 'block') {
            const display = document.getElementById('display-front');
            if (audioMode) {
                display.innerText = "👂";
                playAudio();
            } else {
                display.innerText = currentItem.kanji;
            }
        }
    });

    /* Fetch vocabulary data from Google Sheets and populate the master list */
    async function init() {
        try {
            const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
            const text = await res.text();
            const lines = text.split(/\r?\n/).slice(1);
            masterList = lines.filter(l => l.trim()).map(line => {
                const p = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    kanji: p[0]?.replace(/"/g, '').trim(), reading: p[1]?.replace(/"/g, '').trim(),
                    meaning: p[2]?.replace(/"/g, '').trim(), type: p[3]?.replace(/"/g, '').trim(),
                    sent: p[5]?.replace(/"/g, '').trim(), level: parseInt(p[6]) || 0, nextReview: parseInt(p[7]) || 0
                };
            });
            updateDashboard();
        } catch (e) { console.error("Sheet load failed", e); }
    }

    /* Refresh the dashboard UI with current SRS stage counts and word lists */
    function updateDashboard() {
        const now = Date.now();
        const dueCount = masterList.filter(i => i.nextReview <= now).length;
        document.getElementById('start-btn').innerText = `Start Cooking (${dueCount})`;
        let html = '';
        STAGES.forEach((stage, idx) => {
            const wordsInStage = masterList.filter(i => getStageIdx(i.level) === idx);
            const kanjiList = wordsInStage.map(w => w.kanji).join(', ') || 'No items yet';
            html += `<div class="stat-group" id="group-${idx}"><div class="stat-row" style="background:${stage.color}" onclick="toggleGroup(${idx})"><span>${stage.name} (${wordsInStage.length})</span><button class="btn-mini-play" onclick="startSession('stage', ${idx}, event)">COOK</button></div><div class="level-items">${kanjiList}</div></div>`;
        });
        document.getElementById('stats-display').innerHTML = html;
    }

    /* Initialize a study session based on selected mode (Due, All, or specific Stage) */
    function startSession(mode, stageIdx = null, event = null) {
        if(event) event.stopPropagation();
        const now = Date.now();
        if (mode === 'due') {
            reviewQueue = masterList.filter(i => i.nextReview <= now);
            isPracticeMode = false;
        } else {
            if (mode === 'all') reviewQueue = [...masterList].sort(() => 0.5 - Math.random());
            else if (mode === 'stage') reviewQueue = masterList.filter(i => getStageIdx(i.level) === stageIdx);
            isPracticeMode = true;
        }
        if (reviewQueue.length === 0) return alert("Nothing to cook right now!");
        initialQueueLength = reviewQueue.length;
        completedCount = 0;
        sessionWrongCount = 0;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('card').style.display = 'block';
        document.getElementById('exit-btn').style.display = 'block';
        document.getElementById('progress-container').style.display = 'block';
        document.getElementById('keyboard-legend').style.display = 'block';
        document.getElementById('audio-mode-toggle').style.display = 'flex';
        nextItem(true);
    }

    /* Select and display the next word from the review queue */
    function nextItem(first = false) {
        if (reviewQueue.length === 0) {
            /* Session complete: Reset UI and return to dashboard after delay */
            document.getElementById('card').classList.remove('is-flipped');
            isFlipped = false;
            document.getElementById('display-front').style.display = "none";
            document.getElementById('session-summary').style.display = "flex";
            
            document.getElementById('summary-total').innerText = initialQueueLength;
            document.getElementById('summary-correct').innerText = initialQueueLength - sessionWrongCount;
            document.getElementById('summary-wrong').innerText = sessionWrongCount;

            return;
        }
        
        currentItem = reviewQueue[Math.floor(Math.random() * reviewQueue.length)];
        
        /* Adjust font size dynamically based on character count */
        const kanjiLength = currentItem.kanji.length;
        document.getElementById('display-front').style.fontSize = kanjiLength > 8 ? "2.5rem" : kanjiLength > 4 ? "3.5rem" : "5rem";
        
        if (audioMode) {
            document.getElementById('display-front').innerText = "👂";
            playAudio();
        } else {
            document.getElementById('display-front').innerText = currentItem.kanji;
        }
        
        if (first) updateBackUI();
    }

    /* Populate the back of the card with definitions and examples */
    function updateBackUI() {
        if (!currentItem) return;
        const s = STAGES[getStageIdx(currentItem.level)];
        document.getElementById('card-back-ui').style.borderBottom = `10px solid ${s.color}`;
        document.getElementById('reading-text').innerText = currentItem.reading;
        document.getElementById('reading-text').style.color = s.color;
        document.getElementById('meaning-text').innerText = currentItem.meaning;
        document.getElementById('type-text').innerText = currentItem.type;
        document.getElementById('sent-text').innerText = currentItem.sent || "No example provided.";
        document.getElementById('level-indicator').innerText = `LVL ${currentItem.level}`;
        document.getElementById('info-tray').style.display = "none";
    }

    /* Trigger browser text-to-speech for the current reading */
    function playAudio() {
        const u = new SpeechSynthesisUtterance(currentItem.reading);
        u.lang = 'ja-JP'; window.speechSynthesis.speak(u);
    }

    /* Flip the card to reveal the answer */
    function handleCardClick() { if(!isFlipped) { isFlipped = true; document.getElementById('card').classList.add('is-flipped'); updateBackUI(); } }

    /* Process user feedback, update SRS level, and sync with Google Sheets */
    async function submitResult(isCorrect, e) {
        if(e) e.stopPropagation();
        const cardEl = document.getElementById('card');
        const oldItem = currentItem;
        const nl = isCorrect ? oldItem.level + 1 : Math.max(0, oldItem.level - 1);
        const ivs = [0, 14400000, 28800000, 86400000, 172800000, 604800000, 1209600000, 2592000000, 10000000000];
        
        const levelInd = document.getElementById('level-indicator');
        if (isCorrect) {
            cardEl.classList.add('card-correct');
            levelInd.innerText = `LVL ${oldItem.level} → ${nl}`;
            levelInd.style.color = "#28a745";
            reviewQueue = reviewQueue.filter(i => i !== oldItem);
            completedCount++;
        } else {
            cardEl.classList.add('card-wrong');
            levelInd.innerText = `LVL ${oldItem.level} → ${nl}`;
            levelInd.style.color = "#dc3545";
            sessionWrongCount++;
        }

        /* Send updated SRS data to Google Apps Script endpoint only if not in practice mode */
        if (!isPracticeMode) {
            fetch(SAVE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ kanji: oldItem.kanji, level: nl, nextReview: (Date.now() + ivs[Math.min(nl, 8)]) }) });
        }

        document.getElementById('progress-bar').style.width = (completedCount / initialQueueLength * 100) + "%";
        isFlipped = false; 
        document.getElementById('card').classList.remove('is-flipped');
        setTimeout(() => {
            cardEl.classList.remove('card-correct', 'card-wrong');
            levelInd.style.color = "inherit";
            nextItem();
        }, 400);
    }

    /* Toggle visibility of the example sentence tray */
    function toggleDetails(e) { if(e) e.stopPropagation(); const t = document.getElementById('info-tray'); t.style.display = t.style.display === "block" ? "none" : "block"; }
    /* Global keyboard shortcuts for session navigation */
    window.addEventListener('keydown', e => {
        if (document.getElementById('card').style.display !== 'block') return;
        if (e.key === 'Escape') location.reload();
        if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); if (!isFlipped) handleCardClick(); }
        if (isFlipped) {
            if (e.key === '1') submitResult(true);
            if (e.key === '2') submitResult(false);
            if (e.key === 'f' || e.key === 'F') toggleDetails();
        }
        if (e.key === 'v' || e.key === 'V') playAudio();
    });
    function toggleGroup(idx) { document.querySelectorAll('.stat-group').forEach((g, i) => { if(i === idx) g.classList.toggle('active'); else g.classList.remove('active'); }); }
    function toggleAddForm() { document.getElementById('add-form-overlay').classList.toggle('active'); }
    init();
</script>
</body>
</html>

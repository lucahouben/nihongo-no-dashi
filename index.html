<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japans SRS Trainer</title>
    <style>
        :root {
            --wani-pink: #f100a1;
            --wani-blue: #00aaff;
            --dark: #1a1a1a;
            --text: #ffffff;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #app {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }
        .card {
            background-color: var(--wani-blue);
            font-size: 4.5rem;
            padding: 50px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
        }
        .info-bar {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .answer-box {
            display: none;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            margin-top: 10px;
            border-bottom: 5px solid var(--wani-pink);
        }
        .reading { font-size: 1.8rem; color: var(--wani-pink); margin-bottom: 5px; }
        .meaning { font-size: 1.4rem; color: #fff; }
       
        button {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .btn-show { background-color: #333; color: white; border: 1px solid #444; }
        .btn-correct { background-color: #28a745; color: white; margin-bottom: 10px; }
        .btn-wrong { background-color: #dc3545; color: white; }
       
        .stats {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #555;
        }
        #queue-num { color: var(--wani-blue); font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div class="info-bar" id="status">Laden...</div>
    <div class="card" id="display">...</div>
   
    <div id="controls">
        <button id="show-btn" class="btn-show" onclick="showAnswer()">TOON ANTWOORD</button>
       
        <div id="answer-area" class="answer-box">
            <div id="reading-text" class="reading"></div>
            <div id="meaning-text" class="meaning"></div>
            <div style="margin-top: 25px;">
                <button class="btn-correct" onclick="submitResult(true)">JUIST</button>
                <button class="btn-wrong" onclick="submitResult(false)">ONJUIST</button>
            </div>
        </div>
    </div>

    <div class="stats">
        REVIEWS BESCHIKBAAR: <span id="queue-num">0</span>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ7pDV2s1fCr9E_RI-47f8XTwMUWUQ9bvNiuPVv3D1uM690uoUWxXfMGbtRLbKNTeZVN8Xf-2jjrPb/pub?output=csv';

    let masterList = [];
    let srsData = JSON.parse(localStorage.getItem('jap_srs_v1')) || {};
    let currentItem = null;
    let reviewQueue = [];

    async function init() {
        try {
            const res = await fetch(CSV_URL);
            const csvText = await res.text();
            const lines = csvText.split('\n').map(l => l.trim()).filter(l => l);
           
            // Verwerk CSV (Slaat header over)
            masterList = lines.slice(1).map(line => {
                const parts = line.split(',');
                return { kanji: parts[0], reading: parts[1], meaning: parts[2] };
            });

            refreshQueue();
        } catch (err) {
            document.getElementById('status').innerText = "FOUT BIJ LADEN DATABASE";
        }
    }

    function refreshQueue() {
        const now = Date.now();
        reviewQueue = masterList.filter(item => {
            const progress = srsData[item.kanji] || { nextReview: 0 };
            return progress.nextReview <= now;
        });

        document.getElementById('queue-num').innerText = reviewQueue.length;

        if (reviewQueue.length > 0) {
            nextItem();
        } else {
            showFinished();
        }
    }

    function nextItem() {
        currentItem = reviewQueue[Math.floor(Math.random() * reviewQueue.length)];
        document.getElementById('display').innerText = currentItem.kanji;
        document.getElementById('status').innerText = "Betekenis & Lezing?";
        resetUI();
    }

    function showAnswer() {
        document.getElementById('reading-text').innerText = currentItem.reading;
        document.getElementById('meaning-text').innerText = currentItem.meaning;
        document.getElementById('answer-area').style.display = 'block';
        document.getElementById('show-btn').style.display = 'none';
    }

    function submitResult(isCorrect) {
        if (!srsData[currentItem.kanji]) {
            srsData[currentItem.kanji] = { level: 0, nextReview: 0 };
        }

        let data = srsData[currentItem.kanji];
       
        if (isCorrect) {
            data.level++;
        } else {
            data.level = Math.max(0, data.level - 1);
        }

        // SRS Intervals: 4u, 8u, 1d, 2d, 1wk, 2wk, 1mnd
        const intervals = [0, 14400000, 28800000, 86400000, 172800000, 604800000, 1209600000, 2592000000];
        data.nextReview = Date.now() + (intervals[Math.min(data.level, intervals.length - 1)]);

        localStorage.setItem('jap_srs_v1', JSON.stringify(srsData));
        refreshQueue();
    }

    function resetUI() {
        document.getElementById('answer-area').style.display = 'none';
        document.getElementById('show-btn').style.display = 'block';
    }

    function showFinished() {
        document.getElementById('display').innerText = "🎉";
        document.getElementById('status').innerText = "Alles geleerd voor nu!";
        document.getElementById('show-btn').style.display = 'none';
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nihongo no dashi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍲</text></svg>">
    <style>
        :root {
            --stage-prepping: #8c9e82; --stage-simmering: #e9b86d;
            --stage-boiling: #a66b3e; --stage-infusing: #844c2a; 
            --stage-perfect: #d32f2f; --dashi-gold: #ffcc66;
            --dark-kombu: #121412; --text: #f4f4f4; --card-bg: #222522;
            --toggle-bg: #333; --overlay-bg: rgba(18, 20, 18, 0.98);
        }

        [data-theme="light"] {
            --dark-kombu: #f0f0f0; --text: #1a1a1a;
            --card-bg: #ffffff; --dashi-gold: #d4a017;
            --toggle-bg: #ddd; --overlay-bg: rgba(240, 240, 240, 0.98);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--dark-kombu); color: var(--text);
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 40px 0; box-sizing: border-box; user-select: none;
            overflow: hidden; transition: background-color 0.3s;
        }

        #app { width: 90%; max-width: 400px; text-align: center; perspective: 1200px; position: relative; }

        .theme-switch-wrapper { position: absolute; top: -35px; right: 0; display: flex; align-items: center; }
        .theme-switch { display: inline-block; height: 18px; position: relative; width: 36px; }
        .theme-switch input { display:none; }
        .slider { background-color: var(--toggle-bg); bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: var(--dashi-gold); bottom: 3px; content: ""; height: 12px; left: 3px; position: absolute; transition: .4s; width: 12px; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(18px); }

        #dashboard { background: var(--card-bg); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .dash-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 20px; color: var(--dashi-gold); letter-spacing: 2px; text-transform: uppercase; }
        
        .stats-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-radius: 15px; font-weight: 600; color: white; cursor: pointer; }

        #progress-container { width: 100%; height: 6px; background: rgba(128,128,128,0.2); border-radius: 10px; margin-bottom: 15px; overflow: hidden; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--dashi-gold); transition: width 0.5s ease; }

        /* FLASHCARD */
        .flashcard { width: 100%; height: 480px; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; display: none; }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; display: flex; flex-direction: column; align-items: center; padding: 25px; box-sizing: border-box; box-shadow: 0 15px 45px rgba(0,0,0,0.3); transition: background-color 0.3s; }
        
        .card-front { background-color: var(--dashi-gold); color: #1a1a1a; justify-content: center; }
        #display-front { width: 100%; font-weight: 800; font-size: 5rem; line-height: 1.1; font-family: serif; word-break: keep-all; }

        .card-back { background-color: var(--card-bg); transform: rotateY(180deg); border-bottom: 10px solid var(--stage-prepping); justify-content: flex-start; overflow-y: auto; }
        
        /* IMPROVED WRAPPING */
        .reading { font-size: 2.2rem; font-weight: 800; margin-bottom: 5px; word-break: keep-all; overflow-wrap: anywhere; }
        .meaning { font-size: 1.6rem; color: var(--text); margin-bottom: 15px; font-weight: 400; }

        .type-tag { font-size: 0.6rem; color: var(--dashi-gold); border: 1px solid var(--dashi-gold); padding: 2px 10px; border-radius: 100px; text-transform: uppercase; font-weight: 800; margin-bottom: 12px; letter-spacing: 1px; }

        #info-tray { width: 100%; text-align: left; border-top: 1px solid rgba(128,128,128,0.3); padding-top: 15px; display: none; }
        .tray-label { font-size: 0.55rem; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: 800; letter-spacing: 1px; }
        .tray-content { font-size: 0.9rem; color: var(--text); margin-bottom: 12px; line-height: 1.5; word-break: keep-all; }

        .embedded-controls { width: 100%; margin-top: auto; padding-top: 20px; }
        .btn-correct, .btn-wrong { border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-family: 'Inter'; font-size: 0.8rem; }
        .btn-correct { background: #28a745; color: white; margin-bottom: 8px; }
        .btn-wrong { background: #dc3545; color: white; }

        .btn-main { background: var(--dashi-gold); color: #1a1a1a; padding: 18px; border-radius: 15px; border: none; font-weight: 800; font-size: 0.9rem; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; font-family: 'Inter'; }
        .btn-secondary { background: transparent; color: #888; border: 1px solid rgba(128,128,128,0.4); padding: 12px; border-radius: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; font-size: 0.8rem; font-family: 'Inter'; }

        #keyboard-legend { margin-top: 25px; display: none; color: #888; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .key-hint { border: 1px solid rgba(128,128,128,0.5); padding: 1px 4px; border-radius: 3px; color: var(--dashi-gold); margin: 0 3px; }

        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.6); } 70% { box-shadow: 0 0 0 20px rgba(40, 167, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.6); } 70% { box-shadow: 0 0 0 20px rgba(220, 53, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); } }
        .apply-pulse-correct { animation: pulse-green 0.5s ease-out both; }
        .apply-pulse-wrong { animation: pulse-red 0.5s ease-out both; }
    </style>
</head>
<body>

<div id="pantry-overlay" style="display:none;"></div>

<div id="app">
    <div class="theme-switch-wrapper">
        <span style="font-size: 0.6rem; margin-right: 8px; opacity: 0.6; font-weight: 800;">🌙 / ☀️</span>
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider"></div>
        </label>
    </div>

    <div id="dashboard">
        <div class="dash-title">Nihongo no Dashi</div>
        <div class="stats-list" id="stats-display"></div>
        <button class="btn-main" id="start-btn" onclick="startSession(false)">Start Session (0)</button>
        <button class="btn-secondary" onclick="startSession(true)">Practice All (No Sync)</button>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div class="flashcard" id="card" onclick="handleCardClick()">
        <div class="card-face card-front"><div id="display-front">...</div></div>
        <div class="card-face card-back" id="card-back-ui">
            <div id="type-text" class="type-tag"></div>
            <div id="reading-text" class="reading"></div>
            <div id="meaning-text" class="meaning"></div>
            <div id="info-tray">
                <div class="tray-label">Conjugation</div><div id="conj-text" class="tray-content"></div>
                <div class="tray-label">Example</div><div id="sent-text" class="tray-content"></div>
            </div>
            <div class="embedded-controls">
                <button class="btn-correct" onclick="submitResult(true, event)">Correct (1)</button>
                <button class="btn-wrong" onclick="submitResult(false, event)">Wrong (2)</button>
                <button style="background:none; border:none; color:#888; font-size:0.55rem; width:100%; margin-top:5px; cursor:pointer; font-weight:800;" onclick="toggleDetails(event)">DETAILS (F)</button>
            </div>
        </div>
    </div>

    <div id="keyboard-legend">
        <span class="key-hint">V</span> Audio &nbsp;
        <span class="key-hint">Space</span> Flip &nbsp;
        <span class="key-hint">1/2</span> Result &nbsp;
        <span class="key-hint">F</span> Info
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ7pDV2s1fCr9E_RI-47f8XTwMUWUQ9bvNiuPVv3D1uM690uoUWxXfMGbtRLbKNTeZVN8Xf-2jjrPb/pub?output=csv';
    const SAVE_URL = 'https://script.google.com/macros/s/AKfycbxFMuiEDLfqrDdGSVBezgZ6EG3kEJonGdtJ9JcGxw9_Zwua_MhjN_CQkLHG3gC_d8wo9Q/exec';

    let masterList = [], reviewQueue = [], currentItem = null, isFlipped = false;
    let completedCount = 0, initialQueueLength = 0, isPracticeMode = false;

    const STAGES = [
        { name: "PREPPING", color: "#8c9e82" }, { name: "SIMMERING", color: "#e9b86d" },
        { name: "BOILING", color: "#a66b3e" }, { name: "INFUSING", color: "#844c2a" },
        { name: "PERFECT DASHI", color: "#d32f2f" }
    ];

    function getStage(level) {
        if (level <= 2) return STAGES[0]; if (level <= 4) return STAGES[1];
        if (level <= 6) return STAGES[2]; if (level <= 8) return STAGES[3];
        return STAGES[4];
    }

    const cardEl = document.getElementById('card');

    // SPOILER PREVENTION: Front updates immediately, back updates only when hidden
    cardEl.addEventListener('transitionend', (e) => {
        if (e.propertyName === 'transform' && !isFlipped) {
            updateBackUI();
        }
    });

    if (localStorage.getItem('theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        document.getElementById('checkbox').checked = true;
    }

    document.getElementById('checkbox').addEventListener('change', (e) => {
        const theme = e.target.checked ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    });

    async function init() {
        try {
            const res = await fetch(CSV_URL + '&cb=' + Date.now());
            const csvText = await res.text();
            const lines = csvText.split(/\r?\n/);
            masterList = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim(); if (!line) continue;
                const p = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (p.length >= 8) {
                    masterList.push({
                        kanji: p[0].replace(/^"|"$/g, '').trim(), reading: p[1].replace(/^"|"$/g, '').trim(),
                        meaning: p[2].replace(/^"|"$/g, '').trim(), type: p[3].replace(/^"|"$/g, '').trim(),
                        conj: p[4].replace(/^"|"$/g, '').trim(), sent: p[5].replace(/^"|"$/g, '').trim(),
                        level: parseInt(p[6].replace(/^"|"$/g, '')) || 0, nextReview: parseInt(p[7].replace(/^"|"$/g, '')) || 0
                    });
                }
            }
            updateDashboard();
        } catch (e) { console.error(e); }
    }

    window.addEventListener('keydown', e => {
        if (cardEl.style.display === 'none') return;
        if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); if (!isFlipped) handleCardClick(); }
        if (isFlipped) {
            if (e.key === '1') submitResult(true);
            if (e.key === '2') submitResult(false);
            if (e.key === 'f' || e.key === 'F') toggleDetails(e);
        }
        if (e.key === 'v' || e.key === 'V') speakReading();
    });

    function speakReading() {
        if (currentItem) {
            const u = new SpeechSynthesisUtterance(currentItem.reading);
            u.lang = 'ja-JP'; window.speechSynthesis.speak(u);
        }
    }

    function fitText() {
        const el = document.getElementById('display-front');
        const container = el.parentElement;
        let size = 5.0; el.style.fontSize = size + "rem";
        while ((el.scrollHeight > container.offsetHeight - 40 || el.scrollWidth > container.offsetWidth - 40) && size > 1.0) {
            size -= 0.1; el.style.fontSize = size + "rem";
        }
    }

    function updateDashboard() {
        reviewQueue = masterList.filter(i => i.nextReview <= Date.now());
        const counts = [0,0,0,0,0];
        masterList.forEach(i => counts[STAGES.findIndex(s => s.name === getStage(i.level).name)]++);
        document.getElementById('stats-display').innerHTML = STAGES.map((s, i) => `
            <div class="stat-row" style="background:${s.color}" onclick="openPantry(${i})">
                <div class="stat-name">${s.name}</div><div class="stat-count">${counts[i]}</div>
            </div>`).join('');
        document.getElementById('start-btn').innerText = `Start Session (${reviewQueue.length})`;
    }

    function startSession(practice) {
        isPracticeMode = practice;
        reviewQueue = practice ? [...masterList].sort(() => 0.5 - Math.random()) : masterList.filter(i => i.nextReview <= Date.now());
        initialQueueLength = reviewQueue.length; completedCount = 0;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('progress-container').style.display = 'block';
        cardEl.style.display = 'block';
        document.getElementById('keyboard-legend').style.display = 'block';
        nextItem(true);
    }

    function nextItem(firstItem = false) {
        if (reviewQueue.length === 0) return showFinished();
        currentItem = reviewQueue[Math.floor(Math.random() * reviewQueue.length)];
        
        // Front (Kanji) changes immediately
        document.getElementById('display-front').innerText = currentItem.kanji;
        fitText();

        // If it's the very first item, update back immediately too
        if (firstItem) updateBackUI();
    }

    function updateBackUI() {
        if (!currentItem) return;
        const s = getStage(currentItem.level);
        const back = document.getElementById('card-back-ui');
        back.style.borderBottomColor = s.color;
        document.getElementById('reading-text').innerText = currentItem.reading;
        document.getElementById('reading-text').style.color = s.color;
        document.getElementById('meaning-text').innerText = currentItem.meaning;
        document.getElementById('type-text').innerText = currentItem.type;
        document.getElementById('sent-text').innerHTML = currentItem.sent.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        document.getElementById('conj-text').innerText = currentItem.conj || "None";
        document.getElementById('info-tray').style.display = "none";
    }

    function handleCardClick() { 
        if(!isFlipped) { isFlipped = true; cardEl.classList.add('is-flipped'); } 
    }

    function toggleDetails(e) { 
        if(e) e.stopPropagation(); 
        const t = document.getElementById('info-tray'); 
        t.style.display = t.style.display === "block" ? "none" : "block"; 
    }

    async function submitResult(isCorrect, e) {
        if(e) e.stopPropagation();
        const back = document.getElementById('card-back-ui');
        back.classList.add(isCorrect ? 'apply-pulse-correct' : 'apply-pulse-wrong');
        
        if (!isPracticeMode) {
            const nl = isCorrect ? currentItem.level + 1 : Math.max(0, currentItem.level - 1);
            const ivs = [0, 14400000, 28800000, 86400000, 172800000, 604800000, 1209600000, 2592000000, 10000000000];
            fetch(SAVE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ kanji: currentItem.kanji, level: nl, nextReview: (Date.now() + ivs[Math.min(nl, 8)]) }) });
        }

        if (isCorrect || !isPracticeMode) {
            completedCount++;
            document.getElementById('progress-bar').style.width = (completedCount / initialQueueLength * 100) + "%";
            reviewQueue = reviewQueue.filter(i => i !== currentItem);
        }

        setTimeout(() => { 
            back.classList.remove('apply-pulse-correct', 'apply-pulse-wrong');
            isFlipped = false;
            cardEl.classList.remove('is-flipped');
            nextItem();
        }, 400);
    }

    function showFinished() {
        cardEl.style.display = 'none';
        document.getElementById('progress-container').style.display = 'none';
        document.getElementById('keyboard-legend').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        updateDashboard();
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese SRS - Cloud Sync</title>
    <style>
        :root {
            --wani-pink: #f100a1;
            --wani-blue: #00aaff;
            --dark: #1a1a1a;
            --text: #ffffff;
            --card-bg: #2a2a2a;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #app { 
            width: 100%; 
            max-width: 450px; 
            padding: 20px; 
            text-align: center; 
            perspective: 1000px; 
        }
        
        .info-bar { 
            font-size: 0.8rem; 
            color: #666; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        .flashcard {
            width: 100%;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            margin-bottom: 30px;
        }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            padding: 20px;
            box-sizing: border-box;
        }
        
        .card-front { background-color: var(--wani-blue); font-size: 5.5rem; }
        .card-back { background-color: var(--card-bg); transform: rotateY(180deg); border-bottom: 8px solid var(--wani-pink); }
        
        .reading { font-size: 2.4rem; color: var(--wani-pink); font-weight: bold; margin-bottom: 10px; }
        .meaning { font-size: 1.8rem; color: #fff; }
        
        #controls { height: 130px; display: flex; flex-direction: column; justify-content: center; }
        button {
            width: 100%; padding: 18px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 12px;
            cursor: pointer; transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.96); }
        .btn-correct { background: #28a745; color: white; margin-bottom: 12px; }
        .btn-wrong { background: #dc3545; color: white; }
        
        .stats { margin-top: 30px; font-size: 0.8rem; color: #444; font-weight: bold; }
        #queue-num { color: var(--wani-blue); }
        .hint { font-size: 0.7rem; color: #333; margin-top: 10px; opacity: 0.5; }
    </style>
</head>
<body>

<div id="app">
    <div class="info-bar" id="status">Syncing with Cloud...</div>
    
    <div class="flashcard" id="card" onclick="flipCard()">
        <div class="card-face card-front" id="display-front">...</div>
        <div class="card-face card-back">
            <div id="reading-text" class="reading"></div>
            <div id="meaning-text" class="meaning"></div>
        </div>
    </div>
    
    <div id="controls">
        <div id="action-btns" style="visibility: hidden;">
            <button class="btn-correct" onclick="submitResult(true)">CORRECT</button>
            <button class="btn-wrong" onclick="submitResult(false)">INCORRECT</button>
        </div>
        <div class="hint" id="keyboard-hint">Tap card or SPACE to flip</div>
    </div>

    <div class="stats">
        ITEMS IN QUEUE: <span id="queue-num">0</span>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ7pDV2s1fCr9E_RI-47f8XTwMUWUQ9bvNiuPVv3D1uM690uoUWxXfMGbtRLbKNTeZVN8Xf-2jjrPb/pub?output=csv';
    const SAVE_URL = 'https://script.google.com/macros/s/AKfycbwwoZw3ezALhgWyXKGA1Uubz9d8vvGA4DeZr8yU_VhKfYFNlIIMz9F5wKa0lmxw399oPQ/exec';

    let masterList = [];
    let currentItem = null;
    let reviewQueue = [];
    let isFlipped = false;

    async function init() {
        try {
            const res = await fetch(CSV_URL + '&t=' + Date.now());
            if (!res.ok) throw new Error('Failed to fetch CSV');
            const csvText = await res.text();
            
            const lines = csvText.split(/\r?\n/);
            masterList = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (parts.length >= 5) {
                    masterList.push({
                        kanji: parts[0].replace(/"/g, '').trim(),
                        reading: parts[1].replace(/"/g, '').trim(),
                        meaning: parts[2].replace(/"/g, '').trim(),
                        level: parseInt(parts[3]) || 0,
                        nextReview: parseInt(parts[4]) || 0
                    });
                }
            }
            refreshQueue();
        } catch (err) {
            document.getElementById('status').innerText = "SYNC ERROR";
            console.error(err);
        }
    }

    function refreshQueue() {
        const now = Date.now();
        reviewQueue = masterList.filter(item => item.nextReview <= now);
        document.getElementById('queue-num').innerText = reviewQueue.length;

        if (reviewQueue.length > 0) {
            if (!currentItem) nextItem(); 
        } else {
            showFinished();
        }
    }

    function nextItem() {
        currentItem = reviewQueue[Math.floor(Math.random() * reviewQueue.length)];
        
        document.getElementById('display-front').innerText = currentItem.kanji;
        document.getElementById('reading-text').innerText = currentItem.reading;
        document.getElementById('meaning-text').innerText = currentItem.meaning;
        
        document.getElementById('status').innerText = "Reviewing Kanji";
        document.getElementById('keyboard-hint').innerText = "Tap card or SPACE to flip";
    }

    function flipCard() {
        if (isFlipped || !currentItem) return;
        isFlipped = true;
        document.getElementById('card').classList.add('is-flipped');
        document.getElementById('action-btns').style.visibility = 'visible';
        document.getElementById('keyboard-hint').innerText = "Use 1 for Correct, 2 for Incorrect";
    }

    async function submitResult(isCorrect) {
        document.getElementById('status').innerText = "Updating Cloud...";
        
        let newLevel = isCorrect ? currentItem.level + 1 : Math.max(0, currentItem.level - 1);
        const intervals = [0, 14400000, 28800000, 86400000, 172800000, 604800000, 1209600000, 2592000000];
        let newTime = Date.now() + (intervals[Math.min(newLevel, intervals.length - 1)]);

        // Send to Google Sheets
        fetch(SAVE_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                kanji: currentItem.kanji,
                level: newLevel,
                nextReview: newTime
            })
        });

        currentItem.level = newLevel;
        currentItem.nextReview = newTime;

        isFlipped = false;
        document.getElementById('card').classList.remove('is-flipped');
        document.getElementById('action-btns').style.visibility = 'hidden';

        setTimeout(() => {
            refreshQueue();
        }, 300); 
    }

    function showFinished() {
        document.getElementById('display-front').innerText = "🎉";
        document.getElementById('status').innerText = "SESSION COMPLETE";
        document.getElementById('action-btns').style.visibility = 'hidden';
        document.getElementById('reading-text').innerText = "Great Job!";
        document.getElementById('meaning-text').innerText = "Synced across all devices.";
        document.getElementById('keyboard-hint').innerText = "";
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            flipCard();
        }
        if (isFlipped) {
            if (e.key === '1') submitResult(true);
            if (e.key === '2') submitResult(false);
        }
    });

    init();
</script>
</body>
</html>

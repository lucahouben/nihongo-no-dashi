<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nihongo no dashi</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍲</text></svg>">
    <style>
        :root {
            --stage-prepping: #8c9e82; --stage-simmering: #e9b86d;
            --stage-boiling: #a66b3e; --stage-infusing: #844c2a; 
            --stage-perfect: #d32f2f; --dashi-gold: #ffcc66;
            --dark-kombu: #121412; --text: #f4f4f4; --card-bg: #222522;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--dark-kombu); color: var(--text);
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px 0; box-sizing: border-box; user-select: none;
            overflow-x: hidden;
        }

        #app { width: 90%; max-width: 450px; text-align: center; perspective: 1000px; }

        /* DASHBOARD */
        #dashboard { background: var(--card-bg); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .dash-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; color: var(--dashi-gold); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { padding: 12px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; color: white; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        
        /* PANTRY OVERLAY */
        #pantry-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-kombu); z-index: 2000; display: none;
            flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        .pantry-item { background: #2a2a2a; margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }

        #progress-container { width: 100%; height: 6px; background: #333; border-radius: 10px; margin-bottom: 15px; overflow: hidden; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--dashi-gold); transition: width 0.5s ease; }

        /* FLASHCARD - RESTORED SIZE LOGIC */
        .flashcard { width: 100%; height: 400px; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; display: none; }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        /* FRONT CARD TEXT - RESTORED TO LARGE */
        .card-front { background-color: var(--dashi-gold); color: #1a1a1a; justify-content: center; overflow: hidden; }
        #display-front { width: 100%; font-weight: bold; font-size: 5rem; line-height: 1.1; word-wrap: break-word; }

        .card-back { background-color: var(--card-bg); transform: rotateY(180deg); border-bottom: 10px solid var(--stage-prepping); justify-content: flex-start; overflow-y: auto; }
        .type-tag { font-size: 0.65rem; color: var(--dashi-gold); border: 1px solid var(--dashi-gold); padding: 2px 10px; border-radius: 100px; text-transform: uppercase; font-weight: bold; margin-bottom: 10px; }
        .reading { font-size: 2.2rem; color: var(--stage-prepping); font-weight: bold; margin-bottom: 5px; }
        .meaning { font-size: 1.6rem; color: #fff; margin-bottom: 15px; }

        #info-tray { width: 100%; text-align: left; border-top: 1px solid #444; padding-top: 15px; display: none; }
        .tray-label { font-size: 0.6rem; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .tray-content { font-size: 0.95rem; color: #ddd; margin-bottom: 12px; line-height: 1.4; }

        .btn-main { background: var(--dashi-gold); color: #1a1a1a; padding: 16px; border-radius: 15px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-secondary { background: transparent; color: #888; border: 1px solid #444; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        #controls { margin-top: 20px; display: none; }
        .btn-correct { background: #28a745; color: white; margin-bottom: 12px; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .btn-wrong { background: #dc3545; color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.8); } 70% { box-shadow: 0 0 0 30px rgba(40, 167, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.8); } 70% { box-shadow: 0 0 0 30px rgba(220, 53, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); } }
        .apply-pulse-correct { animation: pulse-green 0.5s ease-out both; }
        .apply-pulse-wrong { animation: pulse-red 0.5s ease-out both; }
    </style>
</head>
<body>

<div id="pantry-overlay">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 id="pantry-title" style="margin: 0;">Pantry</h2>
        <button onclick="closePantry()" style="background: none; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer;">CLOSE</button>
    </div>
    <div id="pantry-list"></div>
</div>

<div id="app">
    <div id="dashboard">
        <div class="dash-title">🍲 NIHONGO NO DASHI</div>
        <div class="stats-grid" id="stats-display"></div>
        <button class="btn-main" id="start-btn" onclick="startSession(false)">START SESSION (0)</button>
        <button class="btn-secondary" onclick="startSession(true)">PRACTICE ALL (No Sync)</button>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div class="flashcard" id="card" onclick="handleCardClick()">
        <div class="card-face card-front"><div id="display-front">...</div></div>
        <div class="card-face card-back" id="card-back-ui">
            <div id="type-text" class="type-tag"></div>
            <div id="reading-text" class="reading"></div>
            <div id="meaning-text" class="meaning"></div>
            <div id="info-tray">
                <div id="conj-section"><div class="tray-label">Conjugation</div><div id="conj-text" class="tray-content"></div></div>
                <div class="tray-label">Example Sentence</div><div id="sent-text" class="tray-content"></div>
            </div>
            <button style="background:none; border:1px solid #444; color:#666; font-size:0.7rem; padding:5px 10px; border-radius:5px; cursor:pointer; margin-top:auto;" onclick="toggleDetails(event)">DETAILS (F)</button>
        </div>
    </div>

    <div id="controls">
        <button class="btn-correct" onclick="submitResult(true)">CORRECT (1)</button>
        <button class="btn-wrong" onclick="submitResult(false)">INCORRECT (2)</button>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ7pDV2s1fCr9E_RI-47f8XTwMUWUQ9bvNiuPVv3D1uM690uoUWxXfMGbtRLbKNTeZVN8Xf-2jjrPb/pub?output=csv';
    const SAVE_URL = 'https://script.google.com/macros/s/AKfycbxFMuiEDLfqrDdGSVBezgZ6EG3kEJonGdtJ9JcGxw9_Zwua_MhjN_CQkLHG3gC_d8wo9Q/exec';

    let masterList = [], reviewQueue = [], currentItem = null, isFlipped = false;
    let completedCount = 0, initialQueueLength = 0, isPracticeMode = false;

    const STAGES = [
        { name: "PREPPING", color: "#8c9e82" }, { name: "SIMMERING", color: "#e9b86d" },
        { name: "BOILING", color: "#a66b3e" }, { name: "INFUSING", color: "#844c2a" },
        { name: "PERFECT DASHI", color: "#d32f2f" }
    ];

    function getStage(level) {
        if (level <= 2) return STAGES[0]; if (level <= 4) return STAGES[1];
        if (level <= 6) return STAGES[2]; if (level <= 8) return STAGES[3];
        return STAGES[4];
    }

    async function init() {
        try {
            const res = await fetch(CSV_URL + '&cb=' + Date.now());
            const csvText = await res.text();
            const lines = csvText.split(/\r?\n/);
            masterList = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim(); if (!line) continue;
                const p = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (p.length >= 8) {
                    masterList.push({
                        kanji: p[0].replace(/^"|"$/g, '').trim(), reading: p[1].replace(/^"|"$/g, '').trim(),
                        meaning: p[2].replace(/^"|"$/g, '').trim(), type: p[3].replace(/^"|"$/g, '').trim(),
                        conj: p[4].replace(/^"|"$/g, '').trim(), sent: p[5].replace(/^"|"$/g, '').trim(),
                        level: parseInt(p[6].replace(/^"|"$/g, '')) || 0, nextReview: parseInt(p[7].replace(/^"|"$/g, '')) || 0
                    });
                }
            }
            updateDashboard();
        } catch (e) { console.error(e); }
    }

    // RESTORED KEYBOARD SHORTCUTS
    window.addEventListener('keydown', e => {
        if (document.getElementById('card').style.display === 'none') return;
        if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); if (!isFlipped) handleCardClick(); }
        if (isFlipped) {
            if (e.key === '1') submitResult(true);
            if (e.key === '2') submitResult(false);
            if (e.key === 'f' || e.key === 'F') toggleDetails(e);
        }
        if (e.key === 'v' || e.key === 'V') speakReading();
    });

    function speakReading() {
        if (!currentItem) return;
        const utterance = new SpeechSynthesisUtterance(currentItem.reading);
        utterance.lang = 'ja-JP';
        window.speechSynthesis.speak(utterance);
    }

    // RESTORED FIT TEXT LOGIC
    function fitText() {
        const el = document.getElementById('display-front');
        const container = el.parentElement;
        let size = 5.0;
        el.style.fontSize = size + "rem";
        while ((el.scrollHeight > container.offsetHeight - 40 || el.scrollWidth > container.offsetWidth - 40) && size > 1.0) {
            size -= 0.1;
            el.style.fontSize = size + "rem";
        }
    }

    function openPantry(idx) {
        const stage = STAGES[idx];
        const filtered = masterList.filter(i => getStage(i.level).name === stage.name);
        document.getElementById('pantry-title').innerText = stage.name;
        document.getElementById('pantry-title').style.color = stage.color;
        document.getElementById('pantry-list').innerHTML = filtered.map(i => `
            <div class="pantry-item">
                <div><b style="font-size:1.2rem">${i.kanji}</b><br><small style="color:#888">${i.reading}</small></div>
                <div style="font-size:0.8rem; color:${stage.color}">Lv ${i.level}</div>
            </div>
        `).join('') || '<p style="color:#666">No items here.</p>';
        document.getElementById('pantry-overlay').style.display = 'flex';
    }

    function closePantry() { document.getElementById('pantry-overlay').style.display = 'none'; }

    function updateDashboard() {
        const now = Date.now();
        reviewQueue = masterList.filter(i => i.nextReview <= now);
        const counts = [0,0,0,0,0];
        masterList.forEach(i => {
            const idx = STAGES.findIndex(s => s.name === getStage(i.level).name);
            counts[idx]++;
        });
        document.getElementById('stats-display').innerHTML = STAGES.map((s, i) => `
            <div class="stat-box" style="background:${s.color}" onclick="openPantry(${i})">
                <div style="opacity:0.7; font-size:0.6rem">${s.name}</div>
                <div style="font-size:1.1rem">${counts[i]}</div>
            </div>
        `).join('');
        document.getElementById('start-btn').innerText = `START SESSION (${reviewQueue.length})`;
    }

    function startSession(practice) {
        isPracticeMode = practice;
        if (practice) reviewQueue = [...masterList].sort(() => 0.5 - Math.random());
        else reviewQueue = masterList.filter(i => i.nextReview <= Date.now());
        initialQueueLength = reviewQueue.length;
        completedCount = 0;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('progress-container').style.display = 'block';
        document.getElementById('card').style.display = 'block';
        nextItem();
    }

    function nextItem() {
        if (reviewQueue.length === 0) return showFinished();
        currentItem = reviewQueue[Math.floor(Math.random() * reviewQueue.length)];
        document.getElementById('display-front').innerText = currentItem.kanji;
        setTimeout(fitText, 10);
        const s = getStage(currentItem.level);
        const back = document.getElementById('card-back-ui');
        back.style.borderBottomColor = s.color;
        document.getElementById('reading-text').innerText = currentItem.reading;
        document.getElementById('reading-text').style.color = s.color;
        document.getElementById('meaning-text').innerText = currentItem.meaning;
        document.getElementById('type-text').innerText = currentItem.type;
        document.getElementById('sent-text').innerHTML = currentItem.sent.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        document.getElementById('info-tray').style.display = "none";
        document.getElementById('controls').style.display = "none";
        isFlipped = false;
        document.getElementById('card').classList.remove('is-flipped');
    }

    function handleCardClick() { if(!isFlipped) { isFlipped = true; document.getElementById('card').classList.add('is-flipped'); document.getElementById('controls').style.display = "block"; } }
    function toggleDetails(e) { if(e) e.stopPropagation(); const t = document.getElementById('info-tray'); t.style.display = t.style.display === "block" ? "none" : "block"; }

    async function submitResult(isCorrect) {
        const back = document.getElementById('card-back-ui');
        back.classList.add(isCorrect ? 'apply-pulse-correct' : 'apply-pulse-wrong');
        if (!isPracticeMode) {
            const nl = isCorrect ? currentItem.level + 1 : Math.max(0, currentItem.level - 1);
            const ivs = [0, 14400000, 28800000, 86400000, 172800000, 604800000, 1209600000, 2592000000, 10000000000];
            const nt = isCorrect ? (Date.now() + ivs[Math.min(nl, 8)]) : Date.now();
            fetch(SAVE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ kanji: currentItem.kanji, level: nl, nextReview: nt }) });
        }
        if (isCorrect || !isPracticeMode) {
            completedCount++;
            document.getElementById('progress-bar').style.width = (completedCount / initialQueueLength * 100) + "%";
            reviewQueue = reviewQueue.filter(i => i !== currentItem);
        }
        setTimeout(() => { back.classList.remove('apply-pulse-correct', 'apply-pulse-wrong'); nextItem(); }, 500);
    }

    function showFinished() {
        document.getElementById('card').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('progress-container').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        updateDashboard();
    }

    init();
</script>
</body>
</html>

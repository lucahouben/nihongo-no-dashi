<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese SRS - Flip Trainer</title>
    <style>
        :root {
            --wani-pink: #f100a1;
            --wani-blue: #00aaff;
            --dark: #1a1a1a;
            --text: #ffffff;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #app { width: 100%; max-width: 450px; padding: 20px; text-align: center; perspective: 1000px; }
       
        /* Flashcard Flip Animation */
        .flashcard {
            width: 100%;
            height: 250px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            margin-bottom: 30px;
        }
        .flashcard.is-flipped { transform: rotateY(180deg); }
       
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
       
        .card-front { background-color: var(--wani-blue); font-size: 5rem; }
        .card-back { background-color: #2a2a2a; transform: rotateY(180deg); border-bottom: 8px solid var(--wani-pink); }
       
        .info-bar { font-size: 0.8rem; color: #666; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .reading { font-size: 2.2rem; color: var(--wani-pink); font-weight: bold; }
        .meaning { font-size: 1.6rem; color: #fff; margin-top: 10px; }
       
        #controls { height: 120px; display: flex; flex-direction: column; justify-content: center; }
        button {
            width: 100%; padding: 16px; font-size: 1rem; font-weight: bold; border: none; border-radius: 8px;
            cursor: pointer; transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.95); }
        .btn-flip { background: #333; color: white; border: 1px solid #444; }
        .btn-correct { background: #28a745; color: white; margin-bottom: 10px; }
        .btn-wrong { background: #dc3545; color: white; }
       
        .stats { margin-top: 20px; font-size: 0.8rem; color: #444; }
        #queue-num { color: var(--wani-blue); font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div class="info-bar" id="status">Loading...</div>
   
    <div class="flashcard" id="card" onclick="flipCard()">
        <div class="card-face card-front" id="display-front">...</div>
        <div class="card-face card-back">
            <div id="reading-text" class="reading"></div>
            <div id="meaning-text" class="meaning"></div>
        </div>
    </div>
   
    <div id="controls">
        <button id="flip-btn" class="btn-flip" onclick="flipCard()">SHOW ANSWER (Space)</button>
       
        <div id="action-btns" style="display:none;">
            <button class="btn-correct" onclick="submitResult(true)">CORRECT</button>
            <button class="btn-wrong" onclick="submitResult(false)">INCORRECT</button>
        </div>
    </div>

    <div class="stats">
        REVIEWS QUEUE: <span id="queue-num">0</span>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ7pDV2s1fCr9E_RI-47f8XTwMUWUQ9bvNiuPVv3D1uM690uoUWxXfMGbtRLbKNTeZVN8Xf-2jjrPb/pub?output=csv';

    let masterList = [];
    let srsData = JSON.parse(localStorage.getItem('jap_srs_v1')) || {};
    let currentItem = null;
    let reviewQueue = [];
    let isFlipped = false;

    async function init() {
        try {
            const res = await fetch(CSV_URL);
            const csvText = await res.text();
            const lines = csvText.split('\n').map(l => l.trim()).filter(l => l);
            masterList = lines.slice(1).map(line => {
                const parts = line.split(',');
                return { kanji: parts[0], reading: parts[1], meaning: parts[2] };
            });
            refreshQueue();
        } catch (err) {
            document.getElementById('status').innerText = "DATABASE ERROR";
        }
    }

    function refreshQueue() {
        const now = Date.now();
        reviewQueue = masterList.filter(item => {
            const progress = srsData[item.kanji] || { nextReview: 0 };
            return progress.nextReview <= now;
        });
        document.getElementById('queue-num').innerText = reviewQueue.length;
        if (reviewQueue.length > 0) nextItem();
        else showFinished();
    }

    function nextItem() {
        isFlipped = false;
        document.getElementById('card').classList.remove('is-flipped');
        currentItem = reviewQueue[Math.floor(Math.random() * reviewQueue.length)];
        document.getElementById('display-front').innerText = currentItem.kanji;
        document.getElementById('reading-text').innerText = currentItem.reading;
        document.getElementById('meaning-text').innerText = currentItem.meaning;
        document.getElementById('status').innerText = "What's the meaning?";
        resetUI();
    }

    function flipCard() {
        if (isFlipped || !currentItem) return;
        isFlipped = true;
        document.getElementById('card').classList.add('is-flipped');
        document.getElementById('flip-btn').style.display = 'none';
        document.getElementById('action-btns').style.display = 'block';
        document.getElementById('status').innerText = "Check your answer";
    }

    function submitResult(isCorrect) {
        if (!srsData[currentItem.kanji]) srsData[currentItem.kanji] = { level: 0, nextReview: 0 };
        let data = srsData[currentItem.kanji];
        if (isCorrect) data.level++;
        else data.level = Math.max(0, data.level - 1);

        const intervals = [0, 14400000, 28800000, 86400000, 172800000, 604800000, 1209600000, 2592000000];
        data.nextReview = Date.now() + (intervals[Math.min(data.level, intervals.length - 1)]);
       
        localStorage.setItem('jap_srs_v1', JSON.stringify(srsData));
        refreshQueue();
    }

    function resetUI() {
        document.getElementById('flip-btn').style.display = 'block';
        document.getElementById('action-btns').style.display = 'none';
    }

    function showFinished() {
        document.getElementById('display-front').innerText = "🎉";
        document.getElementById('status').innerText = "ALL DONE FOR NOW!";
        document.getElementById('flip-btn').style.display = 'none';
    }

    // Keyboard support
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            flipCard();
        }
    });

    init();
</script>
</body>
</html>
